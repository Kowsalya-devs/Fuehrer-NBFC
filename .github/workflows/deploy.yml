# .github/workflows/ci.yml
#
# Continuous Integration — runs on every push and pull request.
#
# Jobs:
#   1. lint          — ESLint with zero warnings policy
#   2. typecheck     — TypeScript compiler with strict mode
#   3. test          — Jest unit + integration tests with coverage
#   4. build         — TypeScript compile to dist/
#   5. docker-build  — Build Docker image (no push) to catch Dockerfile issues
#   6. security      — npm audit + Trivy vulnerability scan
#
# All jobs run in parallel where possible.
# test and build both depend on lint + typecheck passing first.

name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'fix/**'
      - 'release/**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/CODEOWNERS'

  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened

# Cancel in-progress runs on the same branch when a new commit is pushed.
# Prevents queue buildup on fast-moving feature branches.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  # Prisma needs a DATABASE_URL even for generate — use a dummy for CI
  DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci_test'
  REDIS_URL:    'redis://localhost:6379'

jobs:

  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run ESLint
        run: npm run lint
        # Upload lint results as annotations in the PR
        continue-on-error: false

      - name: Check Prettier formatting
        run: npx prettier --check 'src/**/*.ts'


  # ── 2. Typecheck ─────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: TypeScript strict check
        run: npm run typecheck


  # ── 3. Test ───────────────────────────────────────────────────────────────────
  # Spins up PostgreSQL and Redis services for integration tests.
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, typecheck]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB:       ci_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      NODE_ENV:                test
      DATABASE_URL:            postgresql://ci:ci@localhost:5432/ci_test
      REDIS_URL:               redis://localhost:6379
      JWT_SECRET:              ci-test-secret-must-be-32-chars-minimum
      AWS_S3_BUCKET:           ci-test-bucket
      AWS_REGION:              ap-south-1
      LOCAL_ENCRYPTION_KEY:    0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      KYC_PROVIDER:            stub
      BUREAU_PROVIDER:         stub
      PAYMENT_PROVIDER:        stub
      SMS_PROVIDER:            stub
      EMAIL_PROVIDER:          stub
      LOG_LEVEL:               error
      LOG_PRETTY:              false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Run unit tests
        run: npm run test:unit -- --forceExit

      - name: Run integration tests
        run: npm run test:int -- --forceExit

      - name: Generate coverage report
        run: npm run test:coverage -- --forceExit

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token:      ${{ secrets.CODECOV_TOKEN }}
          files:      ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Coverage threshold check
        run: |
          LINES=$(cat coverage/coverage-summary.json | \
            node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); \
            const j=JSON.parse(d); console.log(j.total.lines.pct)")
          echo "Line coverage: ${LINES}%"
          if (( $(echo "$LINES < 70" | bc -l) )); then
            echo "Coverage ${LINES}% is below the 70% threshold"
            exit 1
          fi


  # ── 4. Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, typecheck]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: TypeScript compile
        run: npm run build

      - name: Verify dist/ output
        run: |
          if [ ! -f dist/server.js ]; then
            echo "dist/server.js not found — build failed"
            exit 1
          fi
          echo "Build output:"
          ls -lh dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name:            dist-${{ github.sha }}
          path:            dist/
          retention-days:  3


  # ── 5. Docker build ───────────────────────────────────────────────────────────
  # Builds the image without pushing — catches Dockerfile issues early.
  # The actual push happens in deploy.yml.
  docker-build:
    name: Docker Build (dry run)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context:  .
          push:     false
          tags:     feuhrer-business-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            NODE_ENV=production
            BUILD_SHA=${{ github.sha }}


  # ── 6. Security scan ──────────────────────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run in parallel with test/build — security issues are advisory on feature
    # branches, blocking only on main
    needs: [lint]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: npm audit (high + critical only)
        run: npm audit --audit-level=high
        # Non-blocking on feature branches — blocking on main via branch protection
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for Trivy scan
        uses: docker/build-push-action@v5
        with:
          context:  .
          push:     false
          load:     true
          tags:     feuhrer-business-api:trivy-scan
          cache-from: type=gha

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:    feuhrer-business-api:trivy-scan
          format:       sarif
          output:       trivy-results.sarif
          severity:     CRITICAL,HIGH
          exit-code:    '0'   # Advisory — don't block CI on Trivy findings
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path:   ./
          base:   ${{ github.event.repository.default_branch }}
          head:   HEAD
          extra_args: --only-verified